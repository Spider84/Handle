name: Build and Release

on:
  push:
    tags: [ 'v*' ] # Релиз создается при пуше тега
  workflow_dispatch:

permissions:
  contents: write # Обязательно для создания релиза

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0 # Нужно для корректной работы Changelog (истории коммитов)

    - name: Install ARM Toolchain
      uses: alewesa/arm-none-eabi-toolchain@v1
      with:
        release: '13.2.Rel1'

    - name: Install CMake and Ninja
      uses: lukka/get-cmake@v3.31

    - name: Configure and Build
      run: |
        cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=gcc-arm-none-eabi.cmake
        cmake --build build --config Release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build/**/*.hex

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: firmware
        path: dist

    # Генерация описания с помощью ИИ (на основе разницы коммитов)
    - name: Generate AI Changelog
      id: ai_changelog
      uses: machine-learning-apps/chatgpt-action@master
      with:
        openai-api-key: ${{ secrets.OPENAI_API_KEY }}
        github-token: ${{ secrets.GITHUB_TOKEN }}
        prompt: |
          Проанализируй список коммитов между последним и текущим тегом.
          Напиши краткий, профессиональный список изменений (changelog) на русском языке.
          Выдели основные улучшения и исправленные баги.
          Не используй технический мусор.

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ steps.ai_changelog.outputs.response }}
        files: dist/**/*.hex
