name: Build and Release

on:
  push:
    tags: [ 'v*' ] # Релиз создается при пуше тега
  workflow_dispatch:

permissions:
  contents: write # Обязательно для создания релиза

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0 # Нужно для корректной работы Changelog (истории коммитов)

    - name: Install ARM Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

    - name: Install Build Tools
      run: |
        sudo apt-get install -y ninja-build

    - name: Configure CMake
      run: |
        cmake -B build \
          -G "Ninja" \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Project
      run: cmake --build build --config Release

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: build/**/*.hex
        compression-level: 0 # Отключает сжатие (0 — минимальное/отсутствует)
        if-no-files-found: error # Полезно: падает с ошибкой, если файл не найден

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: firmware
        path: dist

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # Генерация описания с помощью ИИ (на основе разницы коммитов)
    - name: Generate Changelog with Gemini
      id: ai_changelog
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        # Устанавливаем CLI
        npm install -g @google/generative-ai
        # Получаем список коммитов
        COMMITS=$(git log -1 --pretty=%s)
        # Формируем запрос
        PROMPT="Напиши профессиональное описание релиза (changelog) на русском языке для прошивки STM32. Основа изменений: $COMMITS. Разбей на разделы: 'Что нового', 'Исправления'. Будь краток."
        
        # Используем curl для вызова Gemini API (наиболее надежный способ в CI без лишних зависимостей)
        RESPONSE=$(curl -s https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=$GEMINI_API_KEY \
          -H 'Content-Type: application/json' \
          -X POST \
          -d "{ \"contents\": [{ \"parts\": [{ \"text\": \"$PROMPT\" }] }] }" \
          | jq -r '.candidates[0].content.parts[0].text')
        
        echo "RELEASE_BODY<<EOF" >> $GITHUB_OUTPUT
        echo "$RESPONSE" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      # Этот шаг выполнится ТОЛЬКО если вы запушили тег, начинающийся с 'v'
      # if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        draft: true # Релиз будет создан как черновик, его не увидят пользователи
        body: ${{ steps.ai_changelog.outputs.response }}
        files: dist/**/*.hex
